<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Performance Thread Visualizer</title>
    
    <meta name="description" content="A scalable thread management library visualizer with real-time performance metrics and dynamic concurrency tuning.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="layout-wrapper">
        <header>
            <h1>Scalable Thread <span>Manager</span></h1>
            <p>High-Performance Computing Library Visualizer</p>
        </header>

        <main>
            <section class="controls-card">
                <div class="input-group">
                    <input id="taskInput" type="text" placeholder="New Task Name..." aria-label="Task Name">
                    <button onclick="addTask()" class="btn-primary">Add Task</button>
                </div>
                
                <div class="config-group">
                    <div class="slider-container">
                        <label for="concurrencySlider">Threads: <span id="concurrencyValue">3</span></label>
                        <input type="range" id="concurrencySlider" min="1" max="20" value="3" oninput="updateConcurrency(this.value)">
                    </div>
                </div>

                <div class="action-group">
                    <button onclick="startSimulation()" class="btn-success">Start Threads</button>
                    <button onclick="resetAll()" class="btn-outline">Reset Library</button>
                </div>
            </section>

            <section class="visualizer-grid">
                <div class="box queue-box">
                    <div class="box-header">
                        <span class="status-dot warning"></span>
                        <h3>Queue</h3>
                    </div>
                    <div id="queue" class="task-list"></div>
                </div>

                <div class="box running-box">
                    <div class="box-header">
                        <span class="status-dot success"></span>
                        <h3>Pool Workers</h3>
                    </div>
                    <div id="running" class="task-list"></div>
                </div>

                <div class="box completed-box">
                    <div class="box-header">
                        <span class="status-dot info"></span>
                        <h3>Finished</h3>
                    </div>
                    <div id="completed" class="task-list"></div>
                </div>
            </section>

            <section class="stats-dashboard">
                <div class="stat-card">
                    <span class="stat-label">Total Volume</span>
                    <span id="total" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">TPM (Throughput)</span>
                    <span id="throughput" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Avg. Latency</span>
                    <span id="latency" class="stat-value">0s</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">System Load</span>
                    <div class="load-bar-container">
                        <div id="loadBar" class="load-bar" style="width: 0%"></div>
                    </div>
                    <span id="loadText" class="stat-value-sm">0%</span>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Scalable Thread Management Library | High-Performance Computing Edition</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
