<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPC Thread Management Console</title>
    
    <meta name="description" content="Ultra-Premium Scalable Thread Management Dashboard for High-Performance Computing.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="layout-wrapper">
        <header>
            <h1>HPC <span>Manager</span></h1>
            <p>High Performance Scaling Console</p>
        </header>

        <main>
            <!-- Control Hub -->
            <section class="controls-card">
                <div class="input-block">
                    <input id="taskInput" type="text" placeholder="INITIALIZE NEW TASK..." aria-label="Task Name">
                </div>
                
                <div class="config-block">
                    <label>CONCURRENCY LIMIT: <span id="concurrencyValue">3</span></label>
                    <input type="range" id="concurrencySlider" class="slider-styled" min="1" max="50" value="3" oninput="updateConcurrency(this.value)">
                </div>

                <div class="btns-group">
                    <button onclick="addTask()" class="btn-premium btn-blue">Deploy</button>
                    <button onclick="startSimulation()" class="btn-premium btn-green">Execute</button>
                    <button onclick="resetAll()" class="btn-premium btn-outline">Purge</button>
                </div>
            </section>

            <!-- Monitoring Grid -->
            <section class="visualizer-grid">
                <div class="col">
                    <div class="col-header">
                        <span class="dot dot-q"></span>
                        <h3>Queue</h3>
                    </div>
                    <div id="queue" class="task-container"></div>
                </div>

                <div class="col">
                    <div class="col-header">
                        <span class="dot dot-r"></span>
                        <h3>Active Workers</h3>
                    </div>
                    <div id="running" class="task-container"></div>
                </div>

                <div class="col">
                    <div class="col-header">
                        <span class="dot dot-c"></span>
                        <h3>Completed</h3>
                    </div>
                    <div id="completed" class="task-container"></div>
                </div>
            </section>

            <!-- Metrics Bento -->
            <section class="stats-grid">
                <div class="stat-item">
                    <div id="total" class="stat-val">0</div>
                    <div class="stat-lbl">Processed Units</div>
                </div>
                <div class="stat-item">
                    <div id="throughput" class="stat-val">0</div>
                    <div class="stat-lbl">Throughput (TPM)</div>
                </div>
                <div class="stat-item">
                    <div id="latency" class="stat-val">0s</div>
                    <div class="stat-lbl">Avg Latency</div>
                </div>
                <div class="stat-item">
                    <div class="load-viz">
                        <div id="loadBar" class="load-fill" style="width: 0%"></div>
                    </div>
                    <div id="loadText" class="stat-lbl" style="color: var(--status-success)">0% System Load</div>
                </div>
            </section>
        </main>

        <footer>
            <p>HPC EDITION // PROJECT COMPLETED // SECURE LINK ESTABLISHED</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
